name: Build and Release Desktop App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Update version in web_app.py
        shell: bash
        run: |
          python -c "import re; f=open('web_app.py', encoding='utf-8'); c=f.read(); f.close(); c_new=re.sub(r'(?m)^CURRENT_VERSION = \".*\"', 'CURRENT_VERSION = \"${{ github.ref_name }}\"', c); f=open('web_app.py', 'w', encoding='utf-8'); f.write(c_new); f.close(); print('Updated version to ${{ github.ref_name }}')"

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --clean MCPShopee.spec

      - name: Get clean version from tag
        id: get_version
        shell: powershell
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Cleaned version: $version"

      - name: Build Installer using Inno Setup
        shell: powershell
        run: |
          # ISCC.exe is pre-installed on windows-latest runner
          iscc /DMyAppVersion="${{ steps.get_version.outputs.VERSION }}" installer.iss

      - name: Zip portable Windows build
        shell: powershell
        run: |
          Compress-Archive -Path dist/MCPShopee -DestinationPath dist/MCPShopee_Windows_Portable.zip -Force

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            dist/MCPShopeeSetup.exe
            dist/MCPShopee_Windows_Portable.zip

  publish-release:
    runs-on: ubuntu-latest
    needs: [build-windows]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-binaries
          path: ./dist-release

      - name: Display structure of downloaded files
        run: ls -R ./dist-release

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./dist-release/MCPShopeeSetup.exe
            ./dist-release/MCPShopee_Windows_Portable.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
