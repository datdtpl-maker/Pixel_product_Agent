name: Build and Release Desktop App

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --clean PixelDriveCapture.spec

      - name: Get clean version from tag
        id: get_version
        shell: powershell
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Cleaned version: $version"

      - name: Build Installer using Inno Setup
        shell: powershell
        run: |
          # ISCC.exe is pre-installed on windows-latest runner
          iscc /DMyAppVersion="${{ steps.get_version.outputs.VERSION }}" installer.iss

      - name: Zip portable Windows build
        shell: powershell
        run: |
          Compress-Archive -Path dist/PixelDriveCapture -DestinationPath dist/PixelDriveCapture_Windows_Portable.zip -Force

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            dist/PixelDriveCaptureSetup.exe
            dist/PixelDriveCapture_Windows_Portable.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --clean PixelDriveCapture.spec

      - name: Zip macOS App Bundle
        run: |
          # Dùng ditto để bảo toàn các symbolic link và attributes của macOS App Bundle
          ditto -c -k --sequesterRsrc --keepParent dist/PixelDriveCapture.app dist/PixelDriveCapture_macOS.zip

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-binaries
          path: dist/PixelDriveCapture_macOS.zip

  publish-release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-binaries
          path: ./dist-release

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-binaries
          path: ./dist-release

      - name: Display structure of downloaded files
        run: ls -R ./dist-release

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./dist-release/PixelDriveCaptureSetup.exe
            ./dist-release/PixelDriveCapture_Windows_Portable.zip
            ./dist-release/PixelDriveCapture_macOS.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
